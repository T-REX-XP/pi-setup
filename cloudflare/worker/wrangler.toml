name = "pi-setup-secrets"
main = "src/index.ts"
compatibility_date = "2026-04-05"

[[kv_namespaces]]
binding = "PI_SETUP_SECRETS"
id = "ba01ae4309d343059f70318844f2f1a9"

[[d1_databases]]
binding = "PI_DB"
database_name = "pi-setup-db"
# Run: wrangler d1 create pi-setup-db  then paste the id here
database_id = "YOUR_D1_DATABASE_ID"

[durable_objects]
bindings = [
  { name = "PI_RELAY", class_name = "PIRelayDurableObject" }
]

[[migrations]]
tag = "v1"
new_classes = ["PIRelayDurableObject"]

[vars]
PI_SETUP_ALLOWED_ORIGIN = "*"
# Required secrets (set via: wrangler secret put <NAME>):
# - PI_SETUP_BOOTSTRAP_TOKEN
# - PI_SETUP_ENROLLMENT_SIGNING_KEY
