<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>pi-setup fleet dashboard</title>
  <style>body{font-family:system-ui;max-width:900px;margin:40px auto;padding:0 16px}pre{background:#111;color:#0f0;padding:16px;overflow:auto;border-radius:8px}</style>
</head>
<body>
  <h1>pi-setup fleet dashboard</h1>
  <p>Fetches daemon metrics from <code>http://127.0.0.1:4269/metrics</code>.</p>
  <button onclick="load()">Refresh</button>
  <pre id="out">Loading…</pre>
  <script>
    async function load(){
      const res = await fetch('http://127.0.0.1:4269/metrics');
      document.getElementById('out').textContent = JSON.stringify(await res.json(), null, 2);
    }
    load();
  </script>
</body>
</html>
